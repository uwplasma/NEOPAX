# Focused transport debug case:
# - density frozen
# - pressure evolved for e, D, T
# - Er evolved
# - startup prints thermal and Er term breakdowns

[general]
mode = "transport"

[geometry]
vmec_file = "./examples/inputs/wout_QI_nfp2_newNT_opt_hires.nc"
boozer_file = "./examples/inputs/boozermn_wout_QI_nfp2_newNT_opt_hires.nc"
n_radial = 51

[neoclassical]
flux_model = "monkes_database"
entropy_model = "monkes_database"
neoclassical_file = "./examples/inputs/Dij_NEOPAX_FULL_S_NEW_Er_Opt.h5"
interpolation_mode = "preprocessed_3d_radial_ntss1d"









[ambipolarity]
er_ambipolar_method = "two_stage"
er_ambipolar_scan_min = -50.0
er_ambipolar_scan_max = 50.0
er_ambipolar_n_coarse = 80
er_ambipolar_n_refine = 8
er_ambipolar_max_roots = 3
er_ambipolar_tol = 1.0e-6
er_ambipolar_x_tol = 1.0e-6
er_ambipolar_maxiter = 12
er_ambipolar_blocksize = 1
er_ambipolar_overlay_reference_er = true
er_ambipolar_reference_er_file = "./examples/inputs/NTSS_Test_Initial_scaled_flux.h5"
er_ambipolar_reference_er_label = "reference Er"
er_ambipolar_plot = true
er_ambipolar_output_dir = "./outputs/my_ambipolarity_run_scaled_flux"
er_initialization_preprocess_boundary_state = false

[turbulence]
flux_model = "turbulent_power_analytical"
chi_density = [6.5e-05, 6.5e-05, 6.5e-05]
chi_temperature = [0.0065, 0.0065, 0.0065]

[classical]
flux_model = "none"

[energy_grid]
n_x = 3

[species]
n_species = 3
names = ["e", "D", "T"]
mass_mp = [0.000544617, 2.0, 3.0]
charge_qp = [-1.0, 1.0, 1.0]

[profiles]
model = "standard_analytical"
n0 = 4.21
n_edge = 0.6
T0 = 17.8
T_edge = 0.7
c_density = [1.0, 0.5, 0.5]
c_temperature = [1.0, 1.0, 1.0]
density_shape_power = 10.0
temperature_shape_power = 2.0
n_scale = [0.65, 0.65, 0.65]
T_scale =  0.7
er_initialization_mode = "ambipolar_min_entropy"
er0_scale = 100.0
er0_peak_rho = 0.8

[boundary.density.left]
type = "neumann"
[boundary.density.left.gradient]
default = 0.0
[boundary.density.right]
type = "dirichlet"
[boundary.density.right.value]
e = 0.39
D = 0.195
T = 0.195



[boundary.temperature.left]
type = "neumann"
[boundary.temperature.left.gradient]
default = 0.0
[boundary.temperature.right]
type = "robin"
[boundary.temperature.right.value]
default = 1.0
[boundary.temperature.right.decay_length]
default = 0.05

[boundary.Er.left]
type = "dirichlet"
value = 0.0
[boundary.Er.right]
type = "floating_ambipolar_edge"


[equations]
toggle_density = [false, false, false]
toggle_temperature = [true, true, true]
toggle_Er = true

[sources]
temperature = ["power_exchange", "dt_reaction", "fusion_power_fraction_electrons", "bremsstrahlung_radiation"]
[sources.parameters.power_exchange]
mode = "all"
coulomb_log_mode = "ntssfusion"
[sources.parameters.bremsstrahlung_radiation]
coefficient_mode = "ntssfusion"
delta_zeff = 0.0




[transport_solver]
density_floor = 1.0e-3
transport_solver_backend = "radau"
integrator = "radau"
radau_num_stages = 7
radau_error_estimator = "embedded2"
nonlinear_solver_tol = 1.0e-7
nonlinear_solver_maxiter = 20
t0 = 0.0
t_final = 20.0
dt = 1.0e-8
rtol = 1.0e-6
atol = 1.0e-8
max_step = 1.0
min_step = 1.0e-14
max_steps = 20000
throw = false
debug_stage_markers = true
debug_disable_jit = false
save_n = 10

temperature_include_work_term = true
temperature_include_neo_convection = true
temperature_include_turbulent_convection = false
temperature_include_classical_convection = false
temperature_convection_reconstruction = "closure_face_flux"
temperature_heat_flux_reconstruction = "closure_face_flux"

Er_source_mode = "ambipolar_local"
work_source_mode = "local"
Er_relax = 0.1
DEr = 2.0

[transport_output]
transport_plot = true
transport_write_hdf5 = false
transport_compare_ambipolarity_residual = false
transport_scan_ambipolarity_residual = false
transport_overlay_reference_er = true
transport_reference_er_file = "./examples/inputs/NTSS_Test_Initial_scaled_flux.h5"
transport_output_dir = "./outputs/transport_noHe_radau"
transport_plot_n_times = -1
