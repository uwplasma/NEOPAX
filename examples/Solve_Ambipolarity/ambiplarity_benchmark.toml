# Focused transport debug case:
# - density frozen
# - pressure evolved for e, D, T
# - Er evolved
# - startup prints thermal and Er term breakdowns

[general]
mode = "ambipolarity"

[geometry]
vmec_file = "./examples/inputs/wout_QI_nfp2_newNT_opt_hires.nc"
boozer_file = "./examples/inputs/boozermn_wout_QI_nfp2_newNT_opt_hires.nc"
n_radial = 51

[neoclassical]
flux_model = "monkes_database"
entropy_model = "monkes_database"
neoclassical_file = "./examples/inputs/Dij_NEOPAX_FULL_S_NEW_Er_Opt.h5"
interpolation_mode = "preprocessed_3d_radial_ntss1d"









[ambipolarity]
er_ambipolar_method = "two_stage"
er_ambipolar_scan_min = -50.0
er_ambipolar_scan_max = 50.0
er_ambipolar_n_coarse =180
er_ambipolar_n_refine = 8
er_ambipolar_max_roots = 3
er_ambipolar_tol = 1.0e-6
er_ambipolar_x_tol = 1.0e-6
er_ambipolar_maxiter = 12
er_ambipolar_blocksize = 1
er_ambipolar_overlay_reference_er = true
er_ambipolar_reference_er_file = "./examples/inputs/NTSS_Test_Initial_scaled_flux.h5"
er_ambipolar_reference_er_label = "NTSS Er"
er_ambipolar_plot = true
er_ambipolar_output_dir = "./docs/benchmark/figures/"



[energy_grid]
n_x = 4

[species]
n_species = 3
names = ["e", "D", "T"]
mass_mp = [0.000544617, 2.0, 3.0]
charge_qp = [-1.0, 1.0, 1.0]

[profiles]
model = "standard_analytical"
n0 = 4.21
n_edge = 0.6
T0 = 17.8
T_edge = 0.7
c_density = [1.0, 0.5, 0.5]
c_temperature = [1.0, 1.0, 1.0]
density_shape_power = 10.0
temperature_shape_power = 2.0
n_scale = 0.65
T_scale =   0.7
er_initialization_mode = "ambipolar_min_entropy"
er0_scale = 100.0
er0_peak_rho = 0.8

[boundary.density.left]
type = "neumann"
[boundary.density.left.gradient]
default = 0.0
[boundary.density.right]
type = "dirichlet"
[boundary.density.right.value]
e = 0.39
D = 0.195
T = 0.195

[boundary.temperature.left]
type = "neumann"
[boundary.temperature.left.gradient]
default = 0.0
[boundary.temperature.right]
type = "robin"
[boundary.temperature.right.value]
default = 1.0
[boundary.temperature.right.decay_length]
default = 0.05

[boundary.Er.left]
type = "dirichlet"
value = 0.0
[boundary.Er.right]
type = "neumann"
gradient = 0.0

