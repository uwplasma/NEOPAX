[paths]
input_dir = "examples/inputs"
output_dir = "examples/Solve_Er_General"

[geometry]
vmec_file = "wout_QI_nfp2_newNT_opt_hires.nc"
boozer_file = "boozermn_wout_QI_nfp2_newNT_opt_hires.nc"

[grid]
n_x = 4
n_radial = 51

[species]
n_species = 3
names = ["e", "D", "T"]
mass_mp = [0.000544617, 2.0, 3.0]
charge_qp = [-1.0, 1.0, 1.0]

[equations]
# Er diffusion equation: only Er is evolved, density/temperature fixed.
toggle_density = [false, false, false]
toggle_temperature = [false, false, false]
toggle_Er = true
# Set mode to diffusion for Er
er_mode = "diffusion"
# Option to initialize Er from ambipolar root
er_initialization_mode = "ambipolar_root"
# Diffusion coefficient for Er (can be a float or a list for profile)
er_diffusion_coefficient = 1.0e-2
# Source term for Er diffusion (optional, can be zero)
er_source = 0.0
# Boundary conditions for Er
er_left_type = "dirichlet"   # Fix Er at the left (core), e.g., Er=0
er_left_value = 0.0           # Explicitly set Er(left) = 0.0
er_right_type = "neumann"    # Zero gradient at the right (edge), lets ambipolarity set Er
er_right_gradient = 0.0       # Explicitly set dEr/dr(right) = 0.0

[solver]
integrator = "radau"           # Use the RADAU time solver
t0 = 0.0
t_final = 1.0
dt = 1.0e-2
n_save = 10
rtol = 1.0e-7
atol = 1.0e-7

[sources]
# No sources for density/temperature in Er diffusion test

[neoclassical]
model = "monkes_database"
file = "Dij_NEOPAX_FULL_S_NEW_Er_Opt.h5"
momentum_correction_flag = false
transport_model = "neoclassical"

[turbulence]
model = "analytical"
chi_temperature = [0.0, 0.0, 0.0]
chi_density = [0.0, 0.0, 0.0]
transport_model = "analytical"

[profiles]
model = "standard_analytical"
n0 = 4.21e20
n_edge = 0.6e20
T0 = 17.8e3
T_edge = 0.7e3
c_density = [1.0, 0.5, 0.5]
c_temperature = [1.0, 1.0, 1.0]
density_shape_power = 10.0
temperature_shape_power = 2.0
n_scale = 1.0
T_scale = 1.0
er_initialization_mode = "parabolic"
er0_scale = 100.0
er0_peak_rho = 0.8