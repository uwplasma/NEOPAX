[paths]
input_dir = "examples/inputs"
output_dir = "examples/Solve_Er_General"

[geometry]
vmec_file = "wout_QI_nfp2_newNT_opt_hires.nc"
boozer_file = "boozermn_wout_QI_nfp2_newNT_opt_hires.nc"

[grid]
n_x = 4
n_radial = 51

[species]
n_species = 3
names = ["e", "D", "T"]
mass_mp = [0.000544617, 2.0, 3.0]
charge_qp = [-1.0, 1.0, 1.0]

[equations]
# Er-only evolution: keep density/temperature fixed and evolve radial electric field.
toggle_density = [false, false, false]
toggle_temperature = [false, false, false]
toggle_Er = true
er_mode = "diffusion"
er_DEr = 2.0
er_relax = 0.1

density_left_type = "dirichlet"
density_right_type = "dirichlet"
temperature_left_type = "dirichlet"
temperature_right_type = "dirichlet"
er_left_type = "dirichlet"
er_right_type = "dirichlet"

[solver]
integrator = "diffrax_kvaerno5"
t0 = 0.0
t_final = 20.0
dt = 1.0e-4
n_save = 10
rtol = 1.0e-5
atol = 1.0e-5

[sources]
# Optional registry-based source model selection
# density = ["fusion_power_fraction_electrons"]
# temperature = ["bremsstrahlung_radiation"]

[neoclassical]
model = "monkes_database"
file = "Dij_NEOPAX_FULL_S_NEW_Er_Opt.h5"
momentum_correction_flag = false
transport_model = "neoclassical"

[turbulence]
model = "analytical"
chi_temperature = [0.0, 0.0, 0.0]
chi_density = [0.0, 0.0, 0.0]
transport_model = "analytical"

[profiles]
model = "standard_analytical"
n0 = 4.21
n_edge = 0.6
T0 = 17.8
T_edge = 0.7
c_density = [1.0, 0.5, 0.5]
c_temperature = [1.0, 1.0, 1.0]
density_shape_power = 10.0
temperature_shape_power = 2.0
n_scale = 1.0
T_scale = 1.0
er_initialization_mode = "parabolic"
er0_scale = 100.0
er0_peak_rho = 0.8

[root_finding]
# Method selection: "two_stage" or "adaptive"
er_ambipolar_method = "two_stage"  # "multistart_clustered" or "adaptive"

# --- Two-stage method parameters ---
er_ambipolar_n_coarse = 80      # Number of coarse scan points (root bracketing)
er_ambipolar_max_roots = 3      # Maximum roots to pad for output (static shape)

# --- Optional memory/speed optimization ---
er_ambipolar_use_float32 = false  # Use float32 for root finding (saves memory, may be faster)

# --- Adaptive bracketing method parameters ---
er_ambipolar_adaptive_n_init = 3        # Initial number of coarse intervals (starting grid)
er_ambipolar_adaptive_n_subdiv = 2       # Subdivisions per round (2 = bisection)
er_ambipolar_adaptive_n_rounds = 3       # Number of adaptive subdivision rounds
# For challenging cases, try n_init=24, n_rounds=3
# max_brackets should be >= expected number of brackets after subdivision
er_ambipolar_adaptive_max_brackets = 16  # Maximum brackets to pad for JIT (static shape)

# --- Shared parameters ---
er_ambipolar_n_refine = 8       # Number of Newton-bisection steps per bracket (refinement)
er_ambipolar_scan_min = -50.0    # Minimum Er for scan
er_ambipolar_scan_max = 40.0    # Maximum Er for scan
er_ambipolar_tol = 1e-6         # Function tolerance for root
er_ambipolar_x_tol = 1e-6        # Interval tolerance for root
er_ambipolar_blocksize = 0       # Block size for chunked root finding (0 or unset = auto/all)


# --- Multi-start (JIT/diffable) method parameters ---
# These control the multi-start root-finding method ("multistart" or "multistart_clustered")
er_ambipolar_n_starts = 30           # Number of initial guesses (multi-start points)
er_ambipolar_maxiter = 12            # Maximum Newton steps per start
er_ambipolar_cluster_tol = 1e-2      # Clustering epsilon (group roots closer than this)
er_ambipolar_max_clusters = 3        # Maximum number of clusters (roots) to pad for output
